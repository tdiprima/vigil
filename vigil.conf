# Vigil — Daily Security Sweep Configuration
# Copy to /opt/vigil/vigil.conf and customize for your environment

# ─── Paths ────────────────────────────────────────────────
VIGIL_DIR="/opt/vigil"
DATA_DIR="${VIGIL_DIR}/data"
LOG_DIR="${VIGIL_DIR}/logs"
BASELINE_DIR="${DATA_DIR}/baselines"
REPORT_DIR="${DATA_DIR}/reports"

# ─── Email ────────────────────────────────────────────────
EMAIL_RECIPIENT="root"
EMAIL_FROM="vigil@$(hostname -f 2>/dev/null || hostname)"
# Options: mailx, sendmail, msmtp
SMTP_METHOD="mailx"

# ─── Certificate Expiry ──────────────────────────────────
# Space-separated directories to scan for .pem/.crt/.cert files
CERT_DIRS="/etc/ssl/certs /etc/pki/tls/certs /etc/letsencrypt/live"
CERT_WARN_DAYS=30
CERT_CRIT_DAYS=7

# ─── Disk Thresholds (percent) ───────────────────────────
DISK_WARN_PCT=80
DISK_CRIT_PCT=90
INODE_WARN_PCT=80
INODE_CRIT_PCT=90

# ─── Auth Failure Detection ─────────────────────────────
# Failures per IP in last 24 hours
AUTH_FAIL_WARN_THRESHOLD=50
AUTH_FAIL_CRIT_THRESHOLD=200

# ─── Retention ───────────────────────────────────────────
# Delete logs and reports older than this many days (0 = keep forever)
RETENTION_DAYS=30

# ─── Baseline Comparison ────────────────────────────────
# Set to "true" to skip SUID scan (slow on large filesystems)
SKIP_SUID_CHECK="false"
